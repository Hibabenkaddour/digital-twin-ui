services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: digital_twin_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: digital_twin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d digital_twin"]
      interval: 5s
      timeout: 5s
      retries: 10

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: digital_twin_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/digital_twin
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: "false"
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./source_data:/app/source_data
      - ./sample_data:/app/sample_data

volumes:
  pgdata:
