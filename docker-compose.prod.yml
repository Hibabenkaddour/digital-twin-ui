# ═══════════════════════════════════════════════════════════════
# DXC Intelligent Analytics — Production Docker Compose
# Oracle Cloud VM + Cloudflare Tunnel
#
# Usage:
#   cp .env.production .env.prod
#   # Edit .env.prod with real passwords and tokens
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# ═══════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    env_file:
      - ./backend/.env

  # ── Frontend (Nginx reverse proxy + React SPA) ─────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  # ── Cloudflare Tunnel (free public URL) ─────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend

volumes:
  pgdata:
